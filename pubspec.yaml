name: wifi_manager
description: WiFi Manager for Huawei HG531 V1 Router
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Network
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1

  # WebView
  webview_flutter: ^4.10.0

  # Permissions
  permission_handler: ^11.3.1

  # Network Info
  network_info_plus: ^6.0.1
  connectivity_plus: ^6.1.0

  # Utils
  dartz: ^0.10.1
  get_it: ^8.0.3
  intl: ^0.20.2
  path_provider: ^2.1.4
  package_info_plus: ^8.1.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/oui_database.json
    - assets/icons/
    - assets/images/
