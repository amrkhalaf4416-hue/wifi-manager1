name: wifi_manager
description: WiFi Manager for Huawei HG531 V1 Router
version: 1.1.0+2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # المكتبات الأساسية (بدون إصدارات محددة للسماح للـ AI بحلها)
  intl: any
  webview_flutter: any
  dio: any
  flutter_bloc: any
  hive_flutter: any
  get_it: any
  # أضف باقي مكتباتك هنا بكلمة any إذا واجهت فشلاً
  shared_preferences: any
  flutter_screenutil: any
  google_fonts: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: any
  bloc_test: any
